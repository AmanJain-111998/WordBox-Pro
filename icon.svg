<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Logo Group -->
  <g transform="translate(56, 56)" filter="url(#shadow)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="112" height="112" rx="20" fill="url(#greenGrad)" />
    <text x="56" y="74" font-family="'Outfit', 'Inter', sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">W</text>

    <rect x="144" y="0" width="112" height="112" rx="20" fill="url(#grayGrad)" />
    <text x="200" y="74" font-family="'Outfit', 'Inter', sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">O</text>

    <rect x="288" y="0" width="112" height="112" rx="20" fill="url(#yellowGrad)" />
    <text x="344" y="74" font-family="'Outfit', 'Inter', sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">R</text>

    <!-- Row 2 -->
    <rect x="0" y="144" width="112" height="112" rx="20" fill="url(#grayGrad)" />
    <text x="56" y="218" font-family="'Outfit', 'Inter', sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">D</text>

    <rect x="144" y="144" width="112" height="112" rx="20" fill="url(#greenGrad)" />
    <text x="200" y="218" font-family="'Outfit', 'Inter', sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">L</text>

    <rect x="288" y="144" width="112" height="112" rx="20" fill="url(#grayGrad)" />
    <text x="344" y="218" font-family="'Outfit', 'Inter', sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">E</text>

    <!-- Row 3 -->
    <rect x="0" y="288" width="112" height="112" rx="20" fill="url(#yellowGrad)" />
    <text x="56" y="362" font-family="'Outfit', 'Inter', sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">P</text>

    <rect x="144" y="288" width="112" height="112" rx="20" fill="url(#greenGrad)" />
    <text x="200" y="362" font-family="'Outfit', 'Inter', sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">R</text>

    <rect x="288" y="288" width="112" height="112" rx="20" fill="url(#greenGrad)" />
    <text x="344" y="362" font-family="'Outfit', 'Inter', sans-serif" font-size="64" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">O</text>
  </g>
</svg>
